version: 1
applications:
  - appRoot: .
    frontend:
      phases:
        preBuild:
          commands:
            - export NODE_OPTIONS=--max-old-space-size=4096
            - npm ci
        build:
          commands:
            - export NODE_OPTIONS=--max-old-space-size=4096
            echo \"__NEXT_PRIVATE_PREBUNDLED_REACT=next\" >> .env.production
            - npm run build
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          - .next/cache/**/*
